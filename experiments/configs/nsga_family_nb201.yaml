paths:
  pickle: data/HW-NAS-Bench-v1_0.pickle
  nb201: data/NAS-Bench-201-v1_1-096897.pth

search:
  search_space: nasbench201
  device: edgegpu
  dataset: cifar10
  algorithms:
    - NSGA2
    - NSGA-NET
    - NSGA-NET-VNS

runner:
  runs: 5
  population_size: 32
  max_iterations: 80
  seed: 42
  quiet: false

fitness:
  latency_weight: 0.4
  energy_weight: 0.2
  accuracy_weight: 0.4

output:
  directory: ./outputs
  run_name: nsga_family_nb201

extra_kwargs:
  NSGA2:
    crossover_prob: 0.9
    mutation_prob: 0.12
    mutation_rate_dim: 0.25
  NSGA-NET:
    crossover_prob: 0.9
    mutation_prob: 0.15
    mutation_rate_dim: 0.3
  NSGA-NET-VNS:
    crossover_prob: 0.9
    mutation_prob: 0.12
    mutation_rate_dim: 0.25
    vns_elite_fraction: 0.25
    vns_k_max: 3
    vns_trials_per_k: 2
